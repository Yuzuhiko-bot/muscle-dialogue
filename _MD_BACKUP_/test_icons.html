<!DOCTYPE html>
<html>
<head>
    <style>
        .icon-grid { display: grid; grid-template-columns: repeat(4, 100px); gap: 20px; padding: 20px; }
        .icon-box { display: flex; flex-direction: column; align-items: center; border: 1px solid #ccc; padding: 10px; }
        svg { width: 48px; height: 48px; stroke: red; background: yellow; }
        span { margin-top: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="icon-grid">
        <div class="icon-box">
            <!-- Hypertrophy (Muscle) -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12.409 13.017a5 5 0 0 1 9.591 1.983c0 3.866-4 7-9 7s-9-3.134-9-7c0-1.933.746-3.691 2.019-5"/>
                <path d="M12.409 13.017a5 5 0 0 1-1.428-4.483l1.945-4.448a1 1 0 0 1 1.251-.517l2.121.846a1 1 0 0 1 .53 1.268l-1.184 2.708a2 2 0 0 0 .142 1.935Z"/>
                <path d="M2 15c0-6 4.5-9 10-9"/>
                <path d="m16.905 8.117 1.251-.555A2 2 0 0 0 19.34 5.07l-.741-1.67a2 2 0 0 0-2.585-1.03l-1.12.497"/>
            </svg>
            <span>筋肥大 (Muscle)</span>
        </div>
        <div class="icon-box">
            <!-- Diet (Scale) -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="12" cy="11" r="5"/>
                <path d="M12 11l3-3"/>
            </svg>
            <span>ダイエット (Scale)</span>
        </div>
        <div class="icon-box">
            <!-- Health (Pulse) -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
                <path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27"/>
            </svg>
            <span>健康維持 (Pulse)</span>
        </div>
         <div class="icon-box">
            <!-- Advanced (Weightlifter) -->
            <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="50" cy="30" r="10" />
                <path d="M30 60h40M50 60v20c0 5 10 5 10 0v-20h-20v20c0 5-10 5-10 0v-20" />
                <path d="M20 40h60" stroke-width="6" />
                <circle cx="15" cy="40" r="8" />
                <circle cx="85" cy="40" r="8" />
            </svg>
            <span>上級者 (Lift)</span>
        </div>
    </div>
</body>
</html>
